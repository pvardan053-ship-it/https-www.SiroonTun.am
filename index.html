<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siroon Tun</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Siroon Tun</h1>
    <p class="subtitle">Ամրագրում</p>

    <img src="nkar5.png" alt="Շոքեբաղնիք" class="sauna-img">

    <form id="bookingForm">

        <input type="text" id="name" placeholder="Ձեր անունը" required>

        <input type="tel" id="phone" placeholder="Հեռախոսահամար" required>

        <input type="number" id="people" placeholder="Մարդկանց քանակ" min="1" required>

        <label class="inline-label">
            Քանի գիշեր է գիշերակացը
            <input type="number" id="overnightNights" min="0" value="0">
        </label>

        <label class="inline-label">
            Քանի օր է շոքեբաղնիքը
            <input type="number" id="saunaDays" min="0" value="0">
        </label>

        <h2>Ընդհանուր գումար՝ 
            <span id="totalPrice">0</span> դրամ
        </h2>

        <button type="submit">Ամրագրել</button>

    </form>
</div>

<script src="script.js"></script>
</body>
</html>
